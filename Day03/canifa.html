<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./canifa.css" />
  </head>
  <body>
    <header>My Shop</header>

    <section class="banner">Banner quảng cáo</section>

    <main class="container">
      <aside class="sidebar">
        <h3>Danh mục</h3>

        <ul>
          <li>Điện thoại</li>
          <li>Laptop</li>
          <li>Máy tính bảng</li>
          <li>Phụ kiện</li>
        </ul>
      </aside>

      <section class="products">
        <div class="card">
          <img src="https://picsum.photos/300/200?1" />
          <h3>iPhone</h3>
          <p>25.000.000đ</p>
        </div>

        <div class="card">
          <img src="https://picsum.photos/300/200?2" />
          <h3>Macbook</h3>
          <p>35.000.000đ</p>
        </div>

        <div class="card">
          <img src="https://picsum.photos/300/200?3" />
          <h3>iPad</h3>
          <p>15.000.000đ</p>
        </div>

        <div class="card">
          <img src="https://picsum.photos/300/200?4" />
          <h3>AirPods</h3>
          <p>5.000.000đ</p>
        </div>

        <div class="card">
          <img src="https://picsum.photos/300/200?5" />
          <h3>Apple Watch</h3>
          <p>10.000.000đ</p>
        </div>
      </section>
    </main>

    <footer>CodeFarm Shop</footer>
  </body>
</html>
