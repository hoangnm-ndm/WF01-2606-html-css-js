<!DOCTYPE html>

    <title>Document</title>
    <style>
      * {
        box-sizing: border-box;
        padding: 0;
        margin: 0;
      }

      .chess {
        width: 100%;
        aspect-ratio: 1 / 1;
        border: 2px solid red;
        display: flex;
        flex-direction: column;
        .row {
          display: flex;
          width: 100%;
          height: calc(100% / 8);
        }
        .cell {
          width: calc(100% / 8);
        }
        .row:nth-child(odd) {
          .cell:nth-child(odd) {
            background-color: brown;
          }
        }
        .row:nth-child(even) {
          .cell:nth-child(even) {
            background-color: brown;
          }
        }
      }
    </style>
  </head>

    <div class="chess">
